<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역사 상세 돋보기 - 우당탕탕 한국사 모험</title>
    <!-- 구글 폰트 Jua, Gaegu, Nanum Gothic -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-gojoseon: #CD853F;
            --color-goguryeo: #3B82F6;
            --color-baekje: #F59E0B;
            --color-silla: #EC4899;
            --color-gaya: #14B8A6;
            --color-unified-silla: #A78BFA;
            --color-balhae: #34D399;
            --color-goryeo: #84CC16;
            --color-joseon: #DC2626;
            --color-colonial: #4B5563;
            --color-modern: #2563EB;
            
            --bg-color: #FFFDF9;
            --text-color: #333;
            --card-shadow: 0 8px 16px rgba(188, 170, 150, 0.12);
            --card-hover-shadow: 0 12px 24px rgba(188, 170, 150, 0.22);
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 헤더 스타일 */
        header.chronicle-header {
            background: linear-gradient(135deg, #FFEFD5, #FFE4B5);
            text-align: center;
            padding: 30px 20px;
            border-bottom: 5px dashed #D5C2B5;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 20px;
            font-family: 'Jua', sans-serif;
            font-size: 1.1rem;
            color: #8B4513;
            background-color: white;
            border: 2px solid #D6B656;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            background-color: #FFE599;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        header.chronicle-header h1 {
            font-family: 'Jua', sans-serif;
            font-size: 2.6rem;
            color: #5D4037;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 0px white;
        }

        header.chronicle-header p {
            font-family: 'Gaegu', sans-serif;
            font-size: 1.5rem;
            color: #8B5A2B;
            margin: 0;
        }

        /* 메인 컨테이너 */
        .chronicle-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        /* 암기송 탭 컨테이너 */
        .mnemonic-song-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            padding: 15px;
            background-color: #FFF9E6;
            border-radius: 20px;
            border: 3px solid #FFE699;
        }

        .mnemonic-badges-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .mnemonic-badge {
            font-family: 'Jua', sans-serif;
            font-size: 1.15rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border: 2px solid #FFE699;
            color: #A0522D;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.03);
        }

        .mnemonic-badge:hover {
            background-color: #FF8C00;
            color: white;
            border-color: #FF8C00;
            transform: scale(1.15);
        }

        /* 대시보드 그리드 */
        .era-dashboard {
            display: grid;
            grid-template-columns: 1fr 1.15fr;
            gap: 25px;
            position: relative;
            align-items: start;
        }

        /* 왼쪽 국왕 패널 (페이지 스크롤에 동조) */
        .dashboard-left-panel {
            background-color: transparent;
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: visible;
            padding-top: 25vh; /* 첫 번째 왕이 중앙에 오게끔 공간 확보 */
            padding-bottom: 45vh; /* 마지막 왕이 중앙에 오게끔 공간 확보 */
        }

        #left-scroll-panel {
            overflow: visible !important;
            padding-right: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* 오른쪽 인물 & 사건 패널 (화면에 Sticky 고정) */
        .dashboard-right-panel {
            background-color: #FAF6EF;
            border-radius: 25px;
            border: 3px solid #E2D4C9;
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 40px;
            height: calc(100vh - 120px);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 화면 왼쪽 중앙 포인터 깃발 */
        .scroll-indicator-pointer {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background-color: #FF8C00;
            color: white;
            font-family: 'Jua', sans-serif;
            font-size: 1.1rem;
            padding: 10px 18px;
            border-radius: 0 25px 25px 0;
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.35);
            z-index: 99;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: flagBounce 1s infinite alternate ease-in-out;
        }

        @keyframes flagBounce {
            0% { transform: translateY(-50%) translateX(0); }
            100% { transform: translateY(-50%) translateX(8px); }
        }

        .panel-section-title {
            font-family: 'Jua', sans-serif;
            font-size: 1.6rem;
            color: #8B4513;
            border-bottom: 3px solid #E2D4C9;
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .info-tip {
            font-size: 0.85rem;
            color: #8B5A2B;
            margin-bottom: 15px;
            font-weight: bold;
            background-color: #FAF0E6;
            padding: 8px 12px;
            border-radius: 10px;
            text-align: center;
        }

        .panel-scroll-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-right: 8px;
        }

        /* 스크롤바 디자인 */
        .panel-scroll-body::-webkit-scrollbar {
            width: 8px;
        }
        .panel-scroll-body::-webkit-scrollbar-thumb {
            background-color: #E2D4C9;
            border-radius: 4px;
        }
        .panel-scroll-body::-webkit-scrollbar-track {
            background-color: #FDFBF7;
        }

        /* 국왕 카드 (상하 마진으로 간격 분산) */
        .king-card-inline {
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            border: 3px solid #E8D8C8;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-left: 8px solid #CD853F;
            margin: 80px 0;
            scroll-margin-top: 10px;
        }

        .king-card-inline:hover {
            transform: translateY(-4px);
            background-color: #FFFDF9;
            box-shadow: var(--card-hover-shadow);
        }

        .king-card-inline.active-king {
            border: 3.5px solid #FF8C00 !important;
            border-left: 10px solid #FF8C00 !important;
            transform: scale(1.04);
            box-shadow: 0 10px 25px rgba(255,140,0,0.22);
            background-color: #FFFDF0;
        }

        .king-card-inline.dimmed-king {
            opacity: 0.35;
        }

        .chronicle-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .chronicle-card-name {
            font-family: 'Jua', sans-serif;
            font-size: 1.35rem;
            color: #333;
        }

        .chronicle-card-period {
            font-size: 0.9rem;
            color: #A0522D;
            background-color: #FDF4E9;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .chronicle-card-desc {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.5;
            margin: 0;
        }

        /* 사건 카드 */
        .event-card-inline {
            background-color: #FFFBF0;
            border-radius: 18px;
            padding: 20px;
            border: 2px dashed #D6B656;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-card-inline:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            background-color: #FFF9E6;
        }

        .card-year {
            font-family: 'Jua', sans-serif;
            font-size: 1.25rem;
            color: #A0522D;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title {
            font-family: 'Jua', sans-serif;
            font-size: 1.45rem;
            color: #333;
        }

        .card-figure-badge {
            display: inline-block;
            background-color: #FAF0E6;
            color: #8B4513;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: bold;
            align-self: flex-start;
        }

        .card-summary {
            font-size: 1rem;
            color: #666;
            line-height: 1.5;
            margin: 0;
        }

        .card-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid #F0E6DF;
            margin-top: 5px;
        }

        /* 퀴즈 배지 */
        .quiz-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #FFD700;
            color: #8B7500;
            font-family: 'Gaegu', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 10px;
        }

        /* 위인 카드 */
        .figure-card-inline {
            background-color: white;
            border-radius: 18px;
            padding: 18px;
            border: 2px solid #E2D4C9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
        }

        .figure-card-inline:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }

        .figure-item-name {
            font-family: 'Jua', sans-serif;
            font-size: 1.25rem;
            color: #2E8B57;
        }

        .figure-item-job {
            font-size: 0.85rem;
            font-weight: bold;
            color: #8B5A2B;
            background-color: #FAF0E6;
            padding: 3px 10px;
            border-radius: 8px;
            align-self: flex-start;
        }

        .figure-item-desc {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.5;
            margin: 0;
        }

        /* 매국노 경고형 카드 */
        .figure-card-inline.warning-traitor {
            border: 2px solid #EF5350 !important;
            background-color: #FFFDFD;
        }

        /* 필터 초기화 버튼 */
        .reset-filter-btn {
            font-family: 'Jua', sans-serif;
            font-size: 0.95rem;
            color: #2E8B57;
            background-color: #E8F5E9;
            border: 1px solid #A5D6A7;
            padding: 6px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .reset-filter-btn:hover {
            background-color: #C8E6C9;
            transform: translateY(-2px);
        }

        /* 공통 모달 기본 레이아웃 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background-color: white;
            border-radius: 30px;
            max-width: 600px;
            width: 100%;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid #FFEBCD;
            max-height: 90vh;
            overflow-y: auto;
            box-sizing: border-box;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
            z-index: 10;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-year {
            font-family: 'Jua', sans-serif;
            font-size: 1.4rem;
            color: #A0522D;
        }

        .modal-title {
            font-family: 'Jua', sans-serif;
            font-size: 2.2rem;
            color: #333;
            margin-top: 5px;
        }

        .modal-img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #FAF0E6;
        }

        .modal-story {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #444;
            margin-bottom: 25px;
        }

        /* 퀴즈 박스 */
        .quiz-section {
            background-color: #FFF9E6;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #FFE494;
        }

        .quiz-question {
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            color: #8B6508;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            background-color: white;
            border: 2px solid #FFEAA7;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: #555;
            transition: all 0.2s;
            text-align: left;
        }

        .quiz-option:hover {
            background-color: #FFFDF0;
            border-color: #F1C40F;
            transform: translateX(5px);
        }

        .quiz-option.correct {
            background-color: #E8F5E9;
            border-color: #4CAF50;
            color: #2E7D32;
        }

        .quiz-option.wrong {
            background-color: #FFEBEE;
            border-color: #EF5350;
            color: #C62828;
        }

        /* 퀴즈 결과 피드백 */
        .quiz-feedback {
            font-family: 'Gaegu', sans-serif;
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            min-height: 30px;
        }

        /* 푸터 */
        footer {
            background-color: #F0E6DF;
            text-align: center;
            padding: 30px 20px;
            font-family: 'Gaegu', sans-serif;
            font-size: 1.3rem;
            color: #8B7A6B;
            border-top: 5px dashed #D5C2B5;
            margin-top: 30px;
        }

        /* 반응형 스타일 (모바일 대응) */
        @media (max-width: 768px) {
            header.chronicle-header {
                padding: 50px 20px 20px 20px;
            }
            .back-btn {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 15px;
                display: inline-block;
            }
            .era-dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }

            .dashboard-left-panel {
                padding-top: 0;
                padding-bottom: 0;
            }

            .dashboard-right-panel {
                position: relative;
                top: 0;
                height: auto;
                overflow: visible;
            }
        }
    </style>
</head>
<body>

    <header class="chronicle-header">
        <button class="back-btn" onclick="location.href='/history'">← 메인 타임라인으로</button>
        <h1 id="chronicle-page-title">시대를 빛낸 인물과 왕들</h1>
        <p id="chronicle-page-subtitle">어린이를 위한 역사 이야기</p>
    </header>

    <!-- 화면 왼쪽 중앙 포인터 깃발 -->
    <div class="scroll-indicator-pointer">▶ 여기에 왕을 맞추세요!</div>

    <div class="chronicle-container">
        <!-- Mnemonic Song Tab (암기송) -->
        <div id="mnemonic-section" class="mnemonic-song-container" style="display: none;">
            <div id="mnemonic-title">임금 암기 탭</div>
            <div id="mnemonic-badges-container" class="mnemonic-badges-row"></div>
        </div>

        <!-- 2열 대시보드 구조 -->
        <div class="era-dashboard">
            <!-- Left: Kings Panel -->
            <div class="dashboard-left-panel">
                <h3 class="panel-section-title" id="left-panel-title">👑 임금 계보</h3>
                <div class="info-tip">💡 화면을 위아래로 스크롤하거나 왕 카드를 직접 누르면 상세 정보가 연동돼요!</div>
                <div class="panel-scroll-body" id="left-scroll-panel"></div>
            </div>

            <!-- Right: Figures & Events Panel -->
            <div class="dashboard-right-panel">
                <h3 class="panel-section-title">
                    <span id="right-panel-title">🌟 주요 인물 & 사건</span>
                    <button class="reset-filter-btn" id="reset-filter-btn" style="display:none;" onclick="resetFiguresFilter()">🔄 전체 보기</button>
                </h3>
                <div class="panel-scroll-body" id="right-scroll-panel"></div>
            </div>
        </div>
    </div>

    <!-- 퀴즈 상세 모달창 -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <div id="modalYear" class="modal-year">📅 연도</div>
                <h2 id="modalTitle" class="modal-title">사건/인물명</h2>
            </div>
            <img id="modalImg" class="modal-img" src="" alt="역사 이미지" style="display: none;">
            <p id="modalStory" class="modal-story">재미있는 역사 이야기 설명 구절...</p>
            
            <!-- 퀴즈 영역 -->
            <div id="modalQuizSection" class="quiz-section" style="display: none;">
                <div class="quiz-question">⭐ [어린이 역사 퀴즈] <span id="quizText">질문내용</span></div>
                <div class="quiz-options" id="quizOptions"></div>
                <div id="quizFeedback" class="quiz-feedback"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>❤️ 우리 아이들을 위해 정성스레 만든 역사 놀이터 ❤️</p>
        <p style="font-size: 1rem; margin-top: 10px; opacity: 0.8;">© 2026 우당탕탕 한국사 대모험. All rights reserved.</p>
    </footer>

    <script>
        const activeEraId = "{{ era_id }}";

        // 사건 상세 데이터베이스
        const historyData = {
            gojoseon_dangun: {
                year: "BC 2333년",
                title: "단군왕검, 고조선을 세우다!",
                img: "/images/dangun_gojoseon.jpg",

        function isFigureRelated(fig, fullKingName) {
            if (!fig.relatedKings) return false;
            return fig.relatedKings.some(k => {
                let cleanK = k.replace(/\s+/g, "");
                let cleanFull = fullKingName.replace(/\s+/g, "");
                if (cleanFull.includes(cleanK)) return true;

                let match = fullKingName.match(/\((.*?)\)/);
                if (match && match[1]) {
                    let parenthesized = match[1].trim();
                    if (parenthesized.includes(k) || k.includes(parenthesized)) return true;
                }

                let cleanBase = fullKingName.replace(/\(.*?\)/g, "").replace(/\d+대/g, "").trim();
                let tokens = cleanBase.split(/\s+/);
                return tokens.some(tok => tok.includes(k) || k.includes(tok));
            });
        }

        function isEventRelated(evt, fullKingName) {
            if (!evt.relatedKings) return false;
            return evt.relatedKings.some(k => {
                let cleanK = k.replace(/\s+/g, "");
                let cleanFull = fullKingName.replace(/\s+/g, "");
                if (cleanFull.includes(cleanK)) return true;

                let match = fullKingName.match(/\((.*?)\)/);
                if (match && match[1]) {
                    let parenthesized = match[1].trim();
                    if (parenthesized.includes(k) || k.includes(parenthesized)) return true;
                }

                let cleanBase = fullKingName.replace(/\(.*?\)/g, "").replace(/\d+대/g, "").trim();
                let tokens = cleanBase.split(/\s+/);
                return tokens.some(tok => tok.includes(k) || k.includes(tok));
            });
        }

            document.getElementById("chronicle-page-title").innerText = config.title;

            if (header) {
                header.style.background = `linear-gradient(135deg, ${config.themeColor}33, ${config.themeColor}11)`;
            }

            // 왼쪽/오른쪽 섹션 타이틀 설정
            document.getElementById("left-panel-title").innerText = `👑 ${config.leftTitle}`;
            document.getElementById("right-panel-title").innerText = `🌟 ${config.rightTitle}`;

            const cData = chronicleData[config.dataKey];
            if (!cData) return;

            // 암기송 렌더링
            const mSec = document.getElementById("mnemonic-section");
            const mTitle = document.getElementById("mnemonic-title");
            const mBadges = document.getElementById("mnemonic-badges-container");

            let mnemonicStr = cData.mnemonic;
            let mnemonicTitleText = cData.mnemonicTitle;

            if (config.filterKings) {
                const filteredNames = cData.kings.filter(config.filterKings).map(k => {
                    let namePart = k.name.replace(/\(.*?\)/g, "").trim();
                    let tokens = namePart.split(" ");
                    return tokens[tokens.length - 1];
                });
                mnemonicStr = filteredNames.join("-");
                if (activeEraId === 'unifsilla') {
                    mnemonicTitleText = "🌸 통일 신라 임금 암기 탭 (글자를 누르면 해당 임금 카드로 이동!)";
                } else if (activeEraId === 'balhae') {
                    mnemonicTitleText = "🦅 발해 국왕 암기 탭 (글자를 누르면 해당 국왕 카드로 이동!)";
                }
            }

            if (mnemonicStr) {
                mTitle.innerText = mnemonicTitleText;
                mBadges.innerHTML = "";
                
                const tokens = mnemonicStr.split("-");
                tokens.forEach((tok, index) => {
                    const badge = document.createElement("span");
                    badge.className = "mnemonic-badge";
                    badge.title = tok;
                    badge.innerText = tok.substring(0, 1);
                    badge.onclick = () => handleMnemonicClick(tok, index);
                    mBadges.appendChild(badge);
                });

                        if (rPanel) {
                            rPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                };

                card.innerHTML = `
                    <div class="chronicle-card-header">
                        <span class="chronicle-card-name">${king.name}</span>
                        <span class="chronicle-card-period">${king.period || king.term || ''}</span>
                    </div>
                    <p class="chronicle-card-desc">${king.desc}</p>
                `;
                leftScroll.appendChild(card);
            });

            // 초기 오른쪽 패널 채우기
            renderRightPanel(null);

            // 데스크톱인 경우 스크롤 감지 및 첫 번째 왕 선택
            if (window.innerWidth > 768) {
                setTimeout(() => {
                    detectActiveKing();
                }, 100);
            }
        }

        // 암기송 클릭 연동
        function handleMnemonicClick(tok, index) {
            const config = eraConfigs[activeEraId];
            const cData = chronicleData[config.dataKey];
            let kingsData = cData ? cData.kings : [];
            if (config.filterKings) {
                kingsData = kingsData.filter(config.filterKings);
            }

            let targetIndex = -1;
            kingsData.forEach((king, idx) => {
                if (king.name.includes(tok)) {
                    targetIndex = idx;
                }
            });

            if (targetIndex === -1 && kingsData[index]) {
                targetIndex = index;
            }

            if (targetIndex !== -1) {
                const card = document.getElementById(`king-card-${targetIndex}`);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    if (window.innerWidth <= 768) {
                        // 모바일에서는 수동으로 필터 및 스크롤 유도
                        setTimeout(() => {
                            card.click();
                        }, 300);
                    }
                }
            }
        }

        // 오른쪽 패널 채우기
        function renderRightPanel(activeKingName) {
            const config = eraConfigs[activeEraId];
            const rightScroll = document.getElementById("right-scroll-panel");
            if (!rightScroll) return;

            rightScroll.innerHTML = "";

            // Gather Events
            let events = config.events.map(evId => {
                const ev = historyData[evId];
                return ev ? { ...ev, id: evId } : null;
            }).filter(e => e !== null);

            // Gather Figures
            const cData = chronicleData[config.dataKey];
            let figures = cData ? cData.figures : [];
            if (config.filterFigures) {
                figures = figures.filter(config.filterFigures);
            }

            // Filtering
            if (activeKingName) {
                events = events.filter(e => isEventRelated(e, activeKingName));
                figures = figures.filter(f => isFigureRelated(f, activeKingName));
            }

            let matchCount = 0;

            // Render Events
            if (events.length > 0) {
                const sectTitle = document.createElement("div");
                sectTitle.style.fontSize = "1.1rem";
                sectTitle.style.fontWeight = "bold";
                sectTitle.style.color = "#A0522D";
                sectTitle.style.marginBottom = "10px";
                sectTitle.innerText = "📅 주요 역사 사건 (이야기 & 퀴즈)";
                rightScroll.appendChild(sectTitle);

                events.forEach(e => {
                    const card = document.createElement("div");
                    card.className = "event-card-inline";
                    card.onclick = () => openModal(e.id);

                    let quizBadge = e.quiz ? `<span class="quiz-badge">💡 퀴즈</span>` : '';
                    let thumb = e.img ? `<img class="card-thumb" src="${e.img}" alt="${e.title}">` : '';
                    let figureName = e.relatedKings ? `인물: ${e.relatedKings.join(', ')}` : '';

                    card.innerHTML = `
                        ${quizBadge}
                        <div class="card-year">📅 ${e.year}</div>
                        <div class="card-title">${e.title}</div>
                        ${figureName ? `<span class="card-figure-badge">${figureName}</span>` : ''}
                        <p class="card-summary">${e.story.substring(0, 80)}...</p>
                        ${thumb}
                    `;
                    rightScroll.appendChild(card);
                    matchCount++;
                });
            }

            // Render Figures
            if (figures.length > 0) {
                const sectTitle = document.createElement("div");
                sectTitle.style.fontSize = "1.1rem";
                sectTitle.style.fontWeight = "bold";
                sectTitle.style.color = "#2E8B57";
                sectTitle.style.marginBottom = "10px";
                sectTitle.style.marginTop = "15px";
                sectTitle.innerText = "🌟 시대를 빛낸 주요 인물들";
                rightScroll.appendChild(sectTitle);

                figures.forEach(f => {
                    const card = document.createElement("div");
                    let isTraitor = f.job.includes("매국노") || f.job.includes("친일파");
                    card.className = "figure-card-inline" + (isTraitor ? " warning-traitor" : "");

                    if (isTraitor) {
                        card.innerHTML = `
                            <span class="figure-item-name" style="color:#C62828;">⚠️ ${f.name}</span>
                            <span class="figure-item-job" style="background-color:#FFEBEE; color:#C62828;">${f.job}</span>
                            <p class="figure-item-desc">${f.desc}</p>
                        `;
                    } else {
                        card.innerHTML = `
                            <span class="figure-item-name">🌟 ${f.name}</span>
                            <span class="figure-item-job">${f.job}</span>
                            <p class="figure-item-desc">${f.desc}</p>
                        `;
                    }
                    rightScroll.appendChild(card);
                    matchCount++;
                });
            }

            // No matches
            if (matchCount === 0) {
                const noMatch = document.createElement("div");
                noMatch.style.padding = "25px";
                noMatch.style.backgroundColor = "#FFF9E6";
                noMatch.style.borderRadius = "18px";
                noMatch.style.border = "2px dashed #E2D4C9";
                noMatch.style.color = "#8B5A2B";
                noMatch.style.fontSize = "1rem";
                noMatch.style.textAlign = "center";
                noMatch.style.fontWeight = "bold";
                noMatch.innerText = "💡 선택하신 지도자 시기에는 기록된 위인과 사건이 준비 중입니다. 전체 보기 버튼을 클릭해 보세요!";
                rightScroll.appendChild(noMatch);
            }

            // Toggle reset button
            document.getElementById("reset-filter-btn").style.display = activeKingName ? "inline-block" : "none";
        }

        // 필터 동작
        function filterFiguresByKing(kingName, clickedCardId) {
            const cards = document.getElementsByClassName("king-card-inline");
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].id === clickedCardId) {
                    cards[i].classList.add("active-king");
                    cards[i].classList.remove("dimmed-king");
                } else {
                    cards[i].classList.remove("active-king");
                    cards[i].classList.add("dimmed-king");
                }
            }

            currentActiveKingName = kingName;
            renderRightPanel(kingName);
        }

        function resetFiguresFilter() {
            const cards = document.getElementsByClassName("king-card-inline");
            for (let i = 0; i < cards.length; i++) {
                cards[i].classList.remove("active-king");
                cards[i].classList.remove("dimmed-king");
            }
            currentActiveKingName = null;
            renderRightPanel(null);
        }

        // 모달창 제어
        function openModal(id) {
            const data = historyData[id];
            if (!data) return;

            document.getElementById("modalYear").innerText = data.year;
            document.getElementById("modalTitle").innerText = data.title;
            document.getElementById("modalStory").innerText = data.story;

            const modalImg = document.getElementById("modalImg");
            if (data.img) {
                modalImg.src = data.img;
                modalImg.style.display = "block";
            } else {
                modalImg.style.display = "none";
            }

            const quizSection = document.getElementById("modalQuizSection");
            const feedback = document.getElementById("quizFeedback");
            feedback.innerText = "";
            feedback.className = "quiz-feedback";

            if (data.quiz) {
                document.getElementById("quizText").innerText = data.quiz.question;
                const optionsContainer = document.getElementById("quizOptions");
                optionsContainer.innerHTML = "";

                data.quiz.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "quiz-option";
                    btn.innerText = opt.text;
                    btn.onclick = function() {
                        const allOptions = optionsContainer.querySelectorAll(".quiz-option");
                        allOptions.forEach(b => b.disabled = true);

                        if (opt.isCorrect) {
                            btn.classList.add("correct");
                            feedback.innerText = "🎉 정답이에요! 참 잘했어요! ⭐";
                            feedback.style.color = "#2E7D32";
                            triggerConfetti();
                        } else {
                            btn.classList.add("wrong");
                            feedback.innerText = "😢 아쉬워요! 다시 한번 생각해 볼까요?";
                            feedback.style.color = "#C62828";
                        }
                    };
                    optionsContainer.appendChild(btn);
                });

                quizSection.style.display = "block";
            } else {
                quizSection.style.display = "none";
            }

            document.getElementById("historyModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("historyModal").style.display = "none";
        }

        window.onclick = function(event) {
            const hModal = document.getElementById("historyModal");
            if (event.target === hModal) {
                closeModal();
            }
        };

        // 꽃가루 파티 효과
        function triggerConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement("div");
                confetti.style.position = "fixed";
                confetti.style.width = "10px";
                confetti.style.height = "10px";
                confetti.style.backgroundColor = ["#FFD700", "#FF4500", "#FF69B4", "#00FF00", "#00FFFF"][Math.floor(Math.random() * 5)];
                confetti.style.left = (50 + (Math.random() - 0.5) * 40) + "vw";
                confetti.style.top = "50vh";
                confetti.style.borderRadius = "50%";
                confetti.style.zIndex = "999";
                confetti.style.pointerEvents = "none";
                document.body.appendChild(confetti);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 8;
                let vx = Math.cos(angle) * velocity;
                let vy = Math.sin(angle) * velocity - 5;
                
                let opacity = 1;
                let posX = parseFloat(confetti.style.left);
                let posY = 50;

                const anim = setInterval(() => {
                    vy += 0.4;
                    posX += vx * 0.1;
                    posY += vy * 0.4;
                    opacity -= 0.02;

                    confetti.style.left = posX + "vw";
                    confetti.style.top = posY + "vh";
                    confetti.style.opacity = opacity;

                    if (opacity <= 0) {
                        clearInterval(anim);
                        confetti.remove();
                    }
                }, 20);
            }
        }

        let lastActiveKingIndex = -1;

        function detectActiveKing() {
            if (window.innerWidth <= 768) {
                // 모바일 해상도에서는 스크롤 스파이 동작을 비활성화
                return;
            }

            const cards = document.querySelectorAll('.king-card-inline');
            if (cards.length === 0) return;

            const viewportCenter = window.innerHeight / 2;
            let closestIndex = -1;
            let minDistance = Infinity;

            cards.forEach((card, index) => {
                const rect = card.getBoundingClientRect();
                const cardCenter = rect.top + rect.height / 2;
                const distance = Math.abs(viewportCenter - cardCenter);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestIndex = index;
                }
            });

            if (closestIndex !== -1 && closestIndex !== lastActiveKingIndex) {
                lastActiveKingIndex = closestIndex;

                cards.forEach((c, idx) => {
                    if (idx === closestIndex) {
                        c.classList.add("active-king");
                        c.classList.remove("dimmed-king");
                    } else {
                        c.classList.remove("active-king");
                        c.classList.add("dimmed-king");
                    }
                });

                const config = eraConfigs[activeEraId];
                const cData = chronicleData[config.dataKey];
                let kingsData = cData.kings;
                if (config.filterKings) {
                    kingsData = kingsData.filter(config.filterKings);
                }

                if (kingsData[closestIndex]) {
                    currentActiveKingName = kingsData[closestIndex].name;
                    renderRightPanel(currentActiveKingName);
                }
            }
        }

        // 초기 로딩
        document.addEventListener("DOMContentLoaded", function() {
            initRelatedKings();
            renderDashboard();

            // 스크롤 감지 이벤트 등록
            window.addEventListener('scroll', detectActiveKing);

            // 창 크기 변경 시 대응
            window.addEventListener('resize', () => {
                const pointer = document.querySelector('.scroll-indicator-pointer');
                if (window.innerWidth <= 768) {
                    if (pointer) pointer.style.display = 'none';
                    resetFiguresFilter();
                } else {
                    if (pointer) pointer.style.display = 'flex';
                    detectActiveKing();
                }
            });
        });
    </script>
</body>
</html>
