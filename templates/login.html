<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login - James World</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts for premium headers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-container">
    <div class="glass-panel" style="max-width: 400px;">
        <h1>LOG IN</h1>
        <p class="text-center" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">
            James World 시스템 제어판에 로그인합니다
        </p>
        
        <form action="/login" method="post" class="flex-column">
            <div class="form-group">
                <label for="username">사용자명</label>
                <input type="text" id="username" name="username" placeholder="Username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-teal mt-4">Login</button>
        </form>
    </div>
</body>
</html>
