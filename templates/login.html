<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <!-- 모바일 대응 추가 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        form {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #333;
            width: 100%;
            max-width: 400px; /* 폼이 너무 커지지 않게 제한 */
        }
        input {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
        }
        button {
            background-color: #03DAC6;
            border: none;
            padding: 15px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 18px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #018786;
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
