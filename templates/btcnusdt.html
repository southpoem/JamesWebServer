<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: white; /* 배경을 하얀색으로 설정 */
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #000;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        img {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>USDT-KRW Premium / BTC</h1>

    <!-- Picture -->
    <div>
        <img id="picture" src="/refresh-picture" alt="Loading image...">
        <button id="picture_refresh_button">Picture Refresh Button</button>
    </div>
</body>
</html>
